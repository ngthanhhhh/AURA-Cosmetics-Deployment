spring.datasource.url=jdbc:mysql://mysql:3306/${DB_NAME:web_store}?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Ho_Chi_Minh

server.port=8080

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

jwt.secret=${JWT_SECRET:change-this-secret}
jwt.expiration=${JWT_EXPIRATION:86400000}

vnpay.tmn-code=${VNPAY_TMN_CODE:YOUR_VNPAY_TMN_CODE}
vnpay.hash-secret=${VNPAY_HASH_SECRET:YOUR_VNPAY_HASH_SECRET}
vnpay.pay-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.return-url=${VNPAY_RETURN_URL:http://localhost:5173/payments/vnpay-return}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:YOUR_CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY:YOUR_CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:YOUR_CLOUDINARY_API_SECRET}